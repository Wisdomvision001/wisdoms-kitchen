<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu - Wisdom's Kitchen</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/header.css" />
    <link rel="stylesheet" href="/static/css/menu.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <img src="/static/images/logo.png" alt="logo" class="logo" />
        <div class="brand-text">
          <h1>Wisdom's Kitchen</h1>
          <p class="slogan">Authentic Taste, Served Fast</p>
        </div>
        <div class="middle-section">
          <div class="search-wrapper">
            <input
              class="search-bar"
              type="text"
              placeholder="Search menu..."
            />
            <button type="button" class="search-button" aria-label="Search">
              <img src="/static/images/search.svg" alt="Search" />
            </button>
          </div>
        </div>
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/menu">Menu</a>
        <a href="/cart">Cart</a>
      </nav>
    </header>

    <main class="container">
      <h2>Menu</h2>
      <div class="menu-grid">
        {% for item in menu %}
        <div class="menu-card">
          <img
            src="{{ url_for('static', filename='images/' ~ (item.image )) }}"
            alt="{{ item.name }}"
            class="menu-img"
          />
          <h3>{{ item.name }}</h3>
          <p class="desc">{{ item.desc }}</p>

          <p class="price">₦ {{ "{:,.0f}".format(item.price) }}</p>

          <form action="/add_to_cart" method="post" class="add-form">
            <input type="hidden" name="item_id" value="{{ item.id }}" />
            <label
              >Qty
              <input
                type="number"
                name="quantity"
                value="1"
                min="1"
                style="width: 60px"
            /></label>
            <button type="submit">Add to cart</button>
          </form>
        </div>
        {% endfor %}
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; Wisdom's Kitchen</p>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        console.log("Search script loaded");
        const searchInput = document.querySelector(".search-bar");
        const menuCards = document.querySelectorAll(".menu-card");

        if (!searchInput) {
          console.error("Search input not found");
          return;
        }
        if (menuCards.length === 0) {
          console.error("No menu cards found");
          return;
        }

        console.log("Found", menuCards.length, "menu cards");

        searchInput.addEventListener("input", function () {
          const searchTerm = searchInput.value.toLowerCase();
          console.log("Searching for:", searchTerm);

          menuCards.forEach((card) => {
            const itemName = card.querySelector("h3").textContent.toLowerCase();
            if (itemName.includes(searchTerm)) {
              card.style.display = "block";
            } else {
              card.style.display = "none";
            }
          });
        });
      });
    </script>
  </body>
</html>
